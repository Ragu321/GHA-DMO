name: output values
on: push
jobs:
  build:
    outputs:
      version: ${{ steps.steps1.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: step one 
        id: steps1
        run: echo "version= 1.1" >> $GITHUB_OUTPUT
  deploy:   
    needs: build
    runs-on: ubuntu-latest
    steps:
      -  name: deploy the app
         run: echo "the versin of app is ${{ needs.build.outputs.version }}"
         
        
